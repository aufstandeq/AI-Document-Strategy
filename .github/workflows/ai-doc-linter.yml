name: Architecture Repo Audit

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Claude skills validation (hard gate)
      run: python3 verify_claude_skills.py

    - name: Structural validation (hard gate)
      run: python3 verify_docs.py

    - name: Cross-repository audit (hard gate)
      run: python3 verify_e2e.py

    - name: Coverage report (informational)
      run: python3 verify_coverage.py
      continue-on-error: true
